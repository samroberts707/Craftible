---

- name: Add latest php apt repository into sources list
  apt_repository:
      repo: ppa:ondrej/php
      state: present
      update_cache: true

- name: Install PHP and Packages
  apt:
    name: "{{ item }}"
    state: present
    update_cache: true
  with_items:
    - php8.5-cli
    - php8.5-fpm
    - libapache2-mod-php8.5
    - php8.5-mysql
    - php8.5-bcmath
    - php8.5-curl
    - php8.5-zip
    - php8.5-dom
    - php8.5-simplexml
    - php8.5-mbstring
    - php8.5-gd
    - php8.5-intl
    - php8.5-soap
    - php8.5-bz2
    - php8.5-gmp
    - php8.5-readline
    - php8.5-common

- name: Update FPM php.ini
  template:
    src: php.ini.j2
    dest: /etc/php/8.5/fpm/php.ini
    backup: yes
    owner: root
    group: root
    mode: 0644

- name: Update CLI php.ini
  template:
    src: php.ini.j2
    dest: /etc/php/8.5/cli/php.ini
    backup: yes
    owner: root
    group: root
    mode: 0644

# Not sure if needed atm
- name: Disable older versions of PHP for Apache
  community.general.apache2_module:
    state: absent
    name: "{{ item }}"
  with_items:
    - php7.0
    - php7.1
    - php7.2
    - php7.3
    - php7.4
    - php8.0
    - php8.1
    - php8.2
    - php8.3
    - php8.4
    - php8.4-cli
    # - mpm_prefork

- name: Enable PHP8.5 Event Apache Module
  community.general.apache2_module:
    state: present
    name: "{{ item }}"
  with_items:
    # - mpm_event
    - proxy_fcgi
    - http2

- name: Enabling PHP8.5-FPM Conf
  command: >
    sudo a2enconf php8.5-fpm

- name: Restart Apache service
  service:
    name: apache2
    state: restarted